name: Windows CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'
      - name: Run .NET tests
        run: dotnet run --project .\dotnet\NetFence.Core.Tests\NetFence.Core.Tests.csproj -c Release
      - name: Build WPF app
        run: dotnet build .\NetFence.sln -c Release
